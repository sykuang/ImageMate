name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -workspace ImageMate.xcworkspace -scheme ImageMate

      - name: Build Release
        run: |
          xcodebuild build \
            -workspace ImageMate.xcworkspace \
            -scheme ImageMate \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            MARKETING_VERSION=${{ steps.version.outputs.VERSION }}

      - name: Create DMG
        run: |
          DMG_CONTENTS=$(mktemp -d)
          cp -R build/DerivedData/Build/Products/Release/ImageMate.app "$DMG_CONTENTS/"
          ln -s /Applications "$DMG_CONTENTS/Applications"
          hdiutil create -volname ImageMate -srcfolder "$DMG_CONTENTS" \
            -ov -format UDZO ImageMate.dmg
          rm -rf "$DMG_CONTENTS"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ImageMate ${{ steps.version.outputs.VERSION }}
          body: |
            ## ImageMate ${{ steps.version.outputs.VERSION }}

            ### Installation
            1. Download `ImageMate.dmg`
            2. Open the DMG and drag ImageMate to **Applications**
            3. On first launch, macOS may block the app. To allow it:
               - **Right-click** ImageMate.app → **Open** → click **Open** in the dialog
               - Or run: `xattr -cr /Applications/ImageMate.app`
          files: ImageMate.dmg
          generate_release_notes: true
